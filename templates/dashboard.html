<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Productivity App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div style="text-align:center; margin-bottom:20px;">
            <h2>🔥 Streak: {{ streak }} days</h2>
        </div>
        <div class="dashboard-header">
            <h1>Your Dashboard</h1>
            <a href="/logout" class="logout">Logout</a>
        </div>

        <div class="add-task-section">
            <h3>Add New Task</h3>
            <form method="POST" action="/add_task">
                <input type="text" name="task" placeholder="What do you want to accomplish?" required>
                <button type="submit">Add Task</button>
            </form>
        </div>

        <div class="tasks-header">
            <h3>Your Tasks</h3>
        </div>

        {% if tasks %}
            <ul>
                {% for task in tasks %}
                    <li>
                        <span class="{% if task[3] == 'completed' %}completed{% endif %}">
                            {{ task[2] }}
                        </span>
                        <div class="task-actions">
                            <a href="/complete_task/{{ task[0] }}" title="Mark as complete">✔</a>
                            <a href="/delete_task/{{ task[0] }}" title="Delete task">✕</a>
                        </div>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p style="text-align: center; color: #a8a8a8; padding: 40px 0;">
                No tasks yet. Add one to get started! 🌱
            </p>
        {% endif %}
    </div>
</body>
</html>
